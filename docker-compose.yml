services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:14b && wait"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  yves:
    build: .
    env_file:
      - yves/.env
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - yves_data:/app/data
    depends_on:
      - ollama

volumes:
  ollama_data:
  yves_data:
